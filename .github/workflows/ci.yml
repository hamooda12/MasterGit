on:
  push:
  pull_request:
jobs:
  validate-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Repository Structure
        run: |
          test -f README.md || (echo "README.md not found" && exit 1)
          test -d .github || (echo ".github directory not found" && exit 1)
          test -d src || (echo "src directory not found" && exit 1)
          echo "Repository structure is valid"
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Markdown Linting
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
      - uses: actions/checkout@v4
      - name: Python Syntax Check
      - run: |
      - find . -name "*.py" -print0 | xargs -0 -r python -m py_compile
  shell-scripting-validation:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout Code
     - uses: actions/checkout@v4
     - name: Shell Script Validation
     - run: |
     - find . -name "*.sh" -print0 | xargs -0 -r bash -n
